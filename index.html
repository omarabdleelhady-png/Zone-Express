<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Zone Express - تسجيل الدخول</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.44.0/tabler-icons.min.css">
  <style>
    body { display:flex; align-items:center; justify-content:center; min-height:100vh; background:linear-gradient(135deg,#FBF7F4 0%,#F5EDE4 50%,#EDD5BC 100%); }
    .login-logo { text-align:center; margin-bottom:2rem; }
    .logo-icon { width:64px;height:64px;background:var(--primary);border-radius:16px;display:flex;align-items:center;justify-content:center;margin:0 auto 12px; }
    .logo-icon i { font-size:32px;color:#FFF8F3; }
    .error-msg { display:none; }
  </style>
</head>
<body>
  <div class="login-box">
    <div class="login-logo">
      <div class="logo-icon"><i class="ti ti-truck-delivery"></i></div>
      <h1 style="font-size:22px;font-weight:700;color:var(--primary)">Zone Express</h1>
      <p style="font-size:13px;color:var(--text-muted);margin-top:4px">نظام إدارة الشحن</p>
    </div>

    <div class="alert danger error-msg" id="error-msg">
      <i class="ti ti-alert-circle"></i>
      <span id="error-text">خطأ في تسجيل الدخول</span>
    </div>

    <div class="form-group">
      <label class="form-label">البريد الإلكتروني</label>
      <input type="email" class="form-input" id="email" placeholder="email@example.com" autocomplete="email">
    </div>
    <div class="form-group">
      <label class="form-label">كلمة المرور</label>
      <input type="password" class="form-input" id="password" placeholder="••••••••" autocomplete="current-password">
    </div>
    <button class="btn primary lg" style="width:100%;justify-content:center;margin-top:.25rem" id="login-btn" onclick="doLogin()">
      <i class="ti ti-login"></i> تسجيل الدخول
    </button>

    <p style="font-size:12px;color:var(--text-hint);text-align:center;margin-top:1.5rem">
      Zone Express CRM v1.0
    </p>
  </div>

  <script type="module">
    import { login, getCurrentRole } from "./auth.js";

    const role = getCurrentRole();
    if (role) {
      window.location.href = role === "client" ? "my-orders.html" : "dashboard.html";
    }

    window.doLogin = async function() {
      const email = document.getElementById("email").value.trim();
      const password = document.getElementById("password").value;
      const btn = document.getElementById("login-btn");
      const errEl = document.getElementById("error-msg");
      const errText = document.getElementById("error-text");

      if (!email || !password) {
        errText.textContent = "من فضلك ادخل البريد وكلمة المرور";
        errEl.style.display = "flex"; return;
      }

      btn.disabled = true;
      btn.innerHTML = '<div class="spinner"></div> جاري الدخول...';
      errEl.style.display = "none";

      try {
        const user = await login(email, password);
        window.location.href = user.role === "client" ? "my-orders.html" : "dashboard.html";
      } catch(e) {
        errText.textContent = e.message;
        errEl.style.display = "flex";
        btn.disabled = false;
        btn.innerHTML = '<i class="ti ti-login"></i> تسجيل الدخول';
      }
    };

    document.getElementById("password").addEventListener("keydown", e => {
      if (e.key === "Enter") window.doLogin();
    });
  </script>
</body>
</html>
